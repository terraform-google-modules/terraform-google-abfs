apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-abfs-ui-display
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: ABFS UI Terraform module
    source:
      repo: https://github.com/terraform-google-modules/terraform-google-abfs
      dir: /modules/ui
  ui:
    input:
      variables:
        abfs_bootdisk_size_gb:
          name: abfs_bootdisk_size_gb
          title: Abfs Bootdisk Size Gb
        abfs_bootdisk_type:
          name: abfs_bootdisk_type
          title: Abfs Bootdisk Type
        abfs_docker_image_uri:
          name: abfs_docker_image_uri
          title: Abfs Docker Image Uri
        abfs_extra_params:
          name: abfs_extra_params
          title: Abfs Extra Params
        abfs_ui_allow_stopping_for_update:
          name: abfs_ui_allow_stopping_for_update
          title: Abfs Ui Allow Stopping For Update
        abfs_ui_cos_image_ref:
          name: abfs_ui_cos_image_ref
          title: Abfs Ui Cos Image Ref
        abfs_ui_extra_params:
          name: abfs_ui_extra_params
          title: Abfs Ui Extra Params
        abfs_ui_machine_type:
          name: abfs_ui_machine_type
          title: Abfs Ui Machine Type
        abfs_ui_name:
          name: abfs_ui_name
          title: Abfs Ui Name
        abfs_ui_port:
          name: abfs_ui_port
          title: Abfs Ui Port
        abfs_ui_remote_server:
          name: abfs_ui_remote_server
          title: Abfs Ui Remote Server
        abfs_ui_uploader_count:
          name: abfs_ui_uploader_count
          title: Abfs Ui Uploader Count
        abfs_ui_uploader_name_prefix:
          name: abfs_ui_uploader_name_prefix
          title: Abfs Ui Uploader Name Prefix
        goog_cm_deployment_name:
          name: goog_cm_deployment_name
          title: Goog Cm Deployment Name
        project_id:
          name: project_id
          title: Project Id
        service_account_email:
          name: service_account_email
          title: Service Account Email
        subnetwork:
          name: subnetwork
          title: Subnetwork
        zone:
          name: zone
          title: Zone
