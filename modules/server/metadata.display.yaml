        abfs_spanner_instance_config:
          name: abfs_spanner_instance_config
          title: Abfs Spanner Instance Config
        abfs_spanner_instance_display_name:
          name: abfs_spanner_instance_display_name
          title: Abfs Spanner Instance Display Name
        abfs_spanner_instance_max_nodes:
          name: abfs_spanner_instance_max_nodes
          title: Abfs Spanner Instance Max Nodes
        abfs_spanner_instance_min_nodes:
          name: abfs_spanner_instance_min_nodes
          title: Abfs Spanner Instance Min Nodes
        abfs_spanner_instance_name:
          name: abfs_spanner_instance_name
          title: Abfs Spanner Instance Name
        existing_bucket_name:
          name: existing_bucket_name
          title: Existing Bucket Name
        goog_cm_deployment_name:
          name: goog_cm_deployment_name
