apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-google-abfs-server-display
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: ABFS Server Terraform module
    source:
      repo: https://github.com/terraform-google-modules/terraform-google-abfs
      dir: /modules/server
  ui:
    input:
      variables:
        abfs_bootdisk_size_gb:
          name: abfs_bootdisk_size_gb
          title: Abfs Bootdisk Size Gb
        abfs_bootdisk_type:
          name: abfs_bootdisk_type
          title: Abfs Bootdisk Type
        abfs_bucket_location:
          name: abfs_bucket_location
          title: Abfs Bucket Location
        abfs_bucket_name:
          name: abfs_bucket_name
          title: Abfs Bucket Name
        abfs_docker_image_uri:
          name: abfs_docker_image_uri
          title: Abfs Docker Image Uri
        abfs_extra_params:
          name: abfs_extra_params
          title: Abfs Extra Params
        abfs_license:
          name: abfs_license
          title: Abfs License
        abfs_server_allow_stopping_for_update:
          name: abfs_server_allow_stopping_for_update
          title: Abfs Server Allow Stopping For Update
        abfs_server_cos_image_ref:
          name: abfs_server_cos_image_ref
          title: Abfs Server Cos Image Ref
        abfs_server_machine_type:
          name: abfs_server_machine_type
          title: Abfs Server Machine Type
        abfs_server_name:
          name: abfs_server_name
